<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Quản lý FAQs - MedCheck Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --sidebar: #0f172a;
            --primary: #3b82f6;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            background: var(--bg);
        }

        .sidebar {
            width: 280px;
            height: 100vh;
            background: var(--sidebar);
            color: #94a3b8;
            padding: 2rem 1.5rem;
            position: fixed;
        }

        .sidebar h2 {
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 3rem;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #94a3b8;
            padding: 12px 16px;
            text-decoration: none;
            border-radius: 12px;
            margin-bottom: 8px;
        }

        .sidebar a.active {
            background: var(--primary);
            color: white;
        }

        .content {
            margin-left: 280px;
            padding: 40px;
            width: 100%;
        }

        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            gap: 12px;
        }

        .btn-add {
            background: var(--primary);
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .table-card {
            background: white;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f8fafc;
            text-align: left;
            padding: 16px 24px;
            color: #64748b;
            font-size: 0.8rem;
            text-transform: uppercase;
            border-bottom: 1px solid #e2e8f0;
        }

        td {
            padding: 18px 24px;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: top;
        }

        .badge {
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
        }

        .badge.active {
            background: #dcfce7;
            color: #166534;
        }

        .badge.inactive {
            background: #fee2e2;
            color: #991b1b;
        }

        .btn-edit {
            color: var(--primary);
            background: #eff6ff;
            padding: 8px;
            border-radius: 8px;
            text-decoration: none;
            margin-right: 8px;
            display: inline-flex;
        }

        .btn-toggle {
            border: none;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            background: #f8fafc;
            color: #475569;
            margin-right: 8px;
        }

        .btn-delete {
            color: #ef4444;
            background: #fef2f2;
            border: none;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
        }

        .muted {
            font-size: 0.85rem;
            color: #64748b;
            max-width: 520px;
            display: block;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <h2><i class="fa-solid fa-virus-slash"></i> MedCheck</h2>
        <a href="/admin/dashboard"><i class="fa-solid fa-grip"></i> Tổng quan</a>
        <a href="/admin/medicines"><i class="fa-solid fa-pills"></i> Quản lý thuốc</a>
        <a href="/admin/categories"><i class="fa-solid fa-layer-group"></i> Danh mục thuốc</a>
        <a href="/admin/hotlines"><i class="fa-solid fa-phone"></i> Hotlines</a>
        <a href="/admin/faqs" class="active"><i class="fa-solid fa-circle-question"></i> FAQs</a>
        <a href="/admin/reports"><i class="fa-solid fa-flag"></i> Duyệt báo cáo</a>
        <a href="/admin/users"><i class="fa-solid fa-users"></i> Quản lý user</a>
    </div>

    <div class="content">
        <div class="header-flex">
            <h1 style="font-size: 1.5rem; color: #1e293b; margin: 0;">Quản lý FAQs</h1>
            <a href="/admin/faqs/add" class="btn-add"><i class="fa-solid fa-plus"></i> Thêm FAQ</a>
        </div>

        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th>Thứ tự</th>
                        <th>Nội dung</th>
                        <th>Trạng thái</th>
                        <th style="text-align: right;">Công cụ</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="f : ${faqs}">
                        <td style="font-family: monospace; font-weight: 800; color: #64748b;"
                            th:text="${f.displayOrder}"></td>
                        <td>
                            <div style="font-weight: 800;" th:text="${f.question}"></div>
                            <span class="muted" th:text="${f.answer}"></span>
                        </td>
                        <td>
                            <span th:if="${f.status}" class="badge active">HIỂN THỊ</span>
                            <span th:if="${!f.status}" class="badge inactive">ẨN</span>
                        </td>
                        <td style="text-align: right;">
                            <a th:href="@{/admin/faqs/edit/{id}(id=${f.id})}" class="btn-edit" title="Chỉnh sửa"><i
                                     class="fa-solid fa-pen"></i></a>
                            <form th:action="@{/admin/faqs/toggle/{id}(id=${f.id})}" method="post"
                                style="display:inline;">
                                <button type="submit" class="btn-toggle" th:title="${f.status} ? 'Ẩn' : 'Hiển thị'">
                                    <i class="fa-solid"
                                        th:classappend="${f.status} ? ' fa-toggle-on' : ' fa-toggle-off'"></i>
                                </button>
                            </form>
                            <form th:action="@{/admin/faqs/delete/{id}(id=${f.id})}" method="post"
                                style="display:inline;">
                                <button type="submit" class="btn-delete"
                                    onclick="return confirm('Bạn có chắc muốn ẨN FAQ này?')" title="Ẩn"><i
                                        class="fa-solid fa-trash-can"></i></button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
