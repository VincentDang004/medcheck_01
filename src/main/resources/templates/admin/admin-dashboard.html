<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Dashboard - Hệ thống Quản trị MedCheck</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --sidebar: #0f172a;
            --primary: #3b82f6;
            --bg: #f1f5f9;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            background: var(--bg);
        }

        .sidebar {
            width: 280px;
            height: 100vh;
            background: var(--sidebar);
            color: #94a3b8;
            padding: 2rem 1.5rem;
            position: fixed;
        }

        .sidebar h2 {
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 3rem;
            font-size: 1.4rem;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #94a3b8;
            padding: 12px 16px;
            text-decoration: none;
            border-radius: 12px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .sidebar a.active {
            background: var(--primary);
            color: white;
        }

        .sidebar .logout-link {
            margin-top: auto;
            color: #f87171;
            position: absolute;
            bottom: 40px;
            width: calc(100% - 3rem);
        }

        .main {
            margin-left: 280px;
            padding: 40px;
            width: 100%;
        }

        .welcome-hero {
            background: white;
            padding: 40px;
            border-radius: 24px;
            border: 1px solid #e2e8f0;
            margin-bottom: 30px;
        }

        .welcome-hero h1 {
            margin: 0;
            color: #1e293b;
            font-size: 1.8rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
        }

        .stat-card {
            background: white;
            padding: 24px;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
        }

        .stat-card .icon-box {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            font-size: 1.2rem;
        }

        .stat-card h3 {
            font-size: 0.9rem;
            color: #64748b;
            margin: 0;
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: 700;
            color: #1e293b;
            margin: 8px 0;
        }

        .action-btn {
            background: var(--primary);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <h2><i class="fa-solid fa-virus-slash"></i> MedCheck</h2>
        <a href="/admin/dashboard" class="active"><i class="fa-solid fa-grip"></i> Tổng quan</a>
        <a href="/admin/medicines"><i class="fa-solid fa-pills"></i> Quản lý thuốc</a>
        <a href="/admin/categories"><i class="fa-solid fa-layer-group"></i> Danh mục thuốc</a>
        <a href="/admin/hotlines"><i class="fa-solid fa-phone"></i> Hotlines</a>
        <a href="/admin/faqs"><i class="fa-solid fa-circle-question"></i> FAQs</a>
        <a href="/admin/reports"><i class="fa-solid fa-flag"></i> Duyệt báo cáo</a>
        <a href="/logout" class="logout-link"><i class="fa-solid fa-right-from-bracket"></i> Đăng xuất hệ thống</a>
    </div>

    <div class="main">
        <div class="welcome-hero">
            <h1>Chào buổi sáng, Admin! 👋</h1>
            <p style="color: #64748b;">Hệ thống đang hoạt động ổn định. Có <span th:text="${pendingReports}"
                    style="color: var(--primary); font-weight: 700;">0</span> báo cáo cần bạn xử lý ngay.</p>
            <a href="/admin/reports" class="action-btn">Kiểm tra báo cáo ngay</a>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="icon-box" style="background: #eff6ff; color: #3b82f6;"><i class="fa-solid fa-box"></i></div>
                <h3>Tổng danh mục thuốc</h3>
                <div class="value" th:text="${totalMedicines}">0</div>
            </div>
            <div class="stat-card">
                <div class="icon-box" style="background: #fff7ed; color: #f97316;"><i class="fa-solid fa-clock"></i>
                </div>
                <h3>Chờ phê duyệt</h3>
                <div class="value" th:text="${pendingReports}">0</div>
            </div>
            <div class="stat-card">
                <div class="icon-box" style="background: #f0fdf4; color: #22c55e;"><i
                        class="fa-solid fa-shield-check"></i></div>
                <h3>Đã xác nhận giả</h3>
                <div class="value" th:text="${verifiedFake}">0</div>
            </div>
            <div class="stat-card">
                <div class="icon-box" style="background: #fef2f2; color: #ef4444;"><i class="fa-solid fa-ban"></i></div>
                <h3>Yêu cầu đã hủy</h3>
                <div class="value" th:text="${rejectedReports}">0</div>
            </div>
        </div>
    </div>
</body>

</html>
