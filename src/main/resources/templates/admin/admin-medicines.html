<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Kho dữ liệu - MedCheck Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --sidebar: #0f172a;
            --primary: #3b82f6;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            background: var(--bg);
        }

        .sidebar {
            width: 280px;
            height: 100vh;
            background: var(--sidebar);
            color: #94a3b8;
            padding: 2rem 1.5rem;
            position: fixed;
        }

        .sidebar h2 {
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 3rem;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #94a3b8;
            padding: 12px 16px;
            text-decoration: none;
            border-radius: 12px;
            margin-bottom: 8px;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .sidebar a.active {
            background: var(--primary);
            color: white;
        }

        .content {
            margin-left: 280px;
            padding: 40px;
            width: 100%;
        }

        .table-card {
            background: white;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f8fafc;
            text-align: left;
            padding: 16px 24px;
            color: #64748b;
            font-size: 0.8rem;
            text-transform: uppercase;
            border-bottom: 1px solid #e2e8f0;
        }

        td {
            padding: 20px 24px;
            border-bottom: 1px solid #f1f5f9;
        }

        .thumb {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            object-fit: cover;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
        }

        .btn-edit {
            color: var(--primary);
            background: #eff6ff;
            padding: 8px;
            border-radius: 8px;
            text-decoration: none;
            margin-right: 8px;
        }

        .btn-delete {
            color: #ef4444;
            background: #fef2f2;
            border: none;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn-add {
            background: var(--primary);
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <h2><i class="fa-solid fa-virus-slash"></i> MedCheck</h2>
        <a href="/admin/dashboard"><i class="fa-solid fa-grip"></i> Tổng quan</a>
        <a href="/admin/medicines" class="active"><i class="fa-solid fa-pills"></i> Quản lý thuốc</a>
        <a href="/admin/categories"><i class="fa-solid fa-layer-group"></i> Danh mục thuốc</a>
        <a href="/admin/hotlines"><i class="fa-solid fa-phone"></i> Hotlines</a>
        <a href="/admin/faqs"><i class="fa-solid fa-circle-question"></i> FAQs</a>
        <a href="/admin/reports"><i class="fa-solid fa-flag"></i> Duyệt báo cáo</a>
    </div>

    <div class="content">
        <div class="header-flex">
            <h1 style="font-size: 1.5rem; color: #1e293b;">Quản lý kho dược phẩm</h1>
            <a href="/admin/medicines/add" class="btn-add"><i class="fa-solid fa-plus"></i> Thêm dược phẩm mới</a>
        </div>

        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th>Mã Hệ Thống</th>
                        <th>Thông tin thuốc</th>
                        <th style="text-align: right;">Công cụ</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="m : ${medicines}">
                        <td style="font-family: monospace; font-weight: 700; color: #64748b;"
                            th:text="${'#MED-' + m.id}"></td>
                        <td>
                            <div style="display:flex; gap:12px; align-items:center;">
                                <img class="thumb" th:src="${m.imageUrl != null ? m.imageUrl : 'https://placehold.co/88x88/png?text=MED'}" alt="thumb">
                                <div>
                                    <div style="font-weight: 600;" th:text="${m.name}"></div>
                                    <div style="font-size: 0.8rem; color: #94a3b8;" th:text="${m.code}"></div>
                                </div>
                            </div>
                        </td>
                        <td style="text-align: right;">
                            <a th:href="@{/admin/medicines/edit/{id}(id=${m.id})}" class="btn-edit" title="Chỉnh sửa"><i
                                    class="fa-solid fa-pen"></i></a>
                            <form th:action="@{/admin/medicines/delete/{id}(id=${m.id})}" method="post"
                                style="display:inline;">
                                <button type="submit" class="btn-delete"
                                    onclick="return confirm('Ông có chắc muốn xoá dữ liệu này?')" title="Xoá bỏ"><i
                                        class="fa-solid fa-trash-can"></i></button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
