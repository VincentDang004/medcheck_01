<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Quản lý user - MedCheck Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --sidebar: #0f172a;
            --primary: #3b82f6;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            background: var(--bg);
        }

        .sidebar {
            width: 280px;
            height: 100vh;
            background: var(--sidebar);
            color: #94a3b8;
            padding: 2rem 1.5rem;
            position: fixed;
        }

        .sidebar h2 {
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 3rem;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #94a3b8;
            padding: 12px 16px;
            text-decoration: none;
            border-radius: 12px;
            margin-bottom: 8px;
        }

        .sidebar a.active {
            background: var(--primary);
            color: white;
        }

        .content {
            margin-left: 280px;
            padding: 40px;
            width: 100%;
        }

        .table-card {
            background: white;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        td,
        th {
            padding: 18px 24px;
            text-align: left;
        }

        th {
            background: #f8fafc;
            color: #64748b;
            font-size: 0.8rem;
            border-bottom: 1px solid #e2e8f0;
        }

        .badge {
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
        }

        .badge.blocked {
            background: #fee2e2;
            color: #991b1b;
        }

        .badge.active {
            background: #dcfce7;
            color: #166534;
        }

        .btn-block,
        .btn-unblock {
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn-block {
            background: #ef4444;
        }

        .btn-unblock {
            background: #22c55e;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <h2><i class="fa-solid fa-virus-slash"></i> MedCheck</h2>
        <a href="/admin/dashboard"><i class="fa-solid fa-grip"></i> Tổng quan</a>
        <a href="/admin/medicines"><i class="fa-solid fa-pills"></i> Quản lý thuốc</a>
        <a href="/admin/categories"><i class="fa-solid fa-layer-group"></i> Danh mục thuốc</a>
        <a href="/admin/hotlines"><i class="fa-solid fa-phone"></i> Hotlines</a>
        <a href="/admin/faqs"><i class="fa-solid fa-circle-question"></i> FAQs</a>
        <a href="/admin/reports"><i class="fa-solid fa-flag"></i> Duyệt báo cáo</a>
        <a href="/admin/users" class="active"><i class="fa-solid fa-users"></i> Quản lý user</a>
    </div>

    <div class="content">
        <h1 style="font-size: 1.5rem; color: #1e293b; margin-bottom: 30px;">Danh sách người dùng</h1>
        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th>User</th>
                        <th>Vai trò</th>
                        <th>Trạng thái</th>
                        <th>Số báo cáo</th>
                        <th>Spam strike</th>
                        <th>Xử lý</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="u : ${users}">
                        <td>
                            <div style="font-weight: 600;" th:text="${u.username}"></div>
                            <div style="font-size: 0.8rem; color: #94a3b8;"
                                 th:text="${u.lastReportAt != null ? #temporals.format(u.lastReportAt, 'dd/MM/yyyy HH:mm') : 'Chưa báo cáo'}">
                            </div>
                        </td>
                        <td th:text="${u.role}"></td>
                        <td>
                            <span th:class="${u.blocked} ? 'badge blocked' : 'badge active'"
                                th:text="${u.blocked} ? 'Đã khóa' : 'Đang hoạt động'"></span>
                        </td>
                        <td th:text="${u.reportCount}"></td>
                        <td th:text="${u.spamStrike}"></td>
                        <td>
                            <form th:if="${!u.blocked and u.role != 'ADMIN'}"
                                th:action="@{/admin/users/block/{id}(id=${u.id})}" method="post"
                                style="display:inline;">
                                <button type="submit" class="btn-block">Khóa</button>
                            </form>
                            <form th:if="${u.blocked and u.role != 'ADMIN'}"
                                th:action="@{/admin/users/unblock/{id}(id=${u.id})}" method="post"
                                style="display:inline;">
                                <button type="submit" class="btn-unblock">Mở khóa</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
